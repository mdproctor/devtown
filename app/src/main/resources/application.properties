quarkus.http.port=8080

# ── ARC bean exclusions (production only) ─────────────────────────────────────
# CasehubWorkloadProvider (engine-internal) conflicts with JpaWorkloadProvider (casehub-work).
# It should be @DefaultBean in the engine (tracked in engine issue) — excluded here as workaround.
# JpaWorkloadProvider requires a full JPA datasource wired to the work schema (devtown#34 pending).
# Devtown provides DevtownWorkloadProvider @ApplicationScoped as a no-op stand-in.
# %prod. scope: tests manage WorkloadProvider disambiguation via src/test/resources/application.properties.
%prod.quarkus.arc.exclude-types=io.casehub.engine.internal.worker.CasehubWorkloadProvider,io.casehub.work.runtime.service.JpaWorkloadProvider

# ── Jandex index — engine modules without embedded index ───────────────────────
# casehub-engine and casehub-engine-common lack Jandex indices (engine doesn't configure
# jandex-maven-plugin per module). Force Quarkus to index them for CDI bean discovery.
# %prod. scope prevents these from being applied during @QuarkusTest augmentation,
# which manages engine bean discovery separately via src/test/resources/application.properties.
%prod.quarkus.index-dependency.casehub-engine.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine.artifact-id=casehub-engine
%prod.quarkus.index-dependency.casehub-engine-common.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine-common.artifact-id=casehub-engine-common

# ── Engine persistence SPIs — in-memory for Layer 1-2 development ─────────────────
# Devtown provides @ApplicationScoped @Default subclasses of the in-memory SPI
# implementations in casehub-engine-persistence-memory. These satisfy the four engine
# CDI injection sites without requiring selected-alternatives activation.
# Replace with casehub-engine-persistence-hibernate (devtown#40) for a PostgreSQL backend.

# GitHub integration — set via environment
# devtown.github.token=${GITHUB_TOKEN:}
# devtown.github.base-url=https://api.github.com

# ── Qhorus named datasource ────────────────────────────────────────────────────
# db-kind must be declared here (not test-only) so Quarkus augmentation resolves
# the named persistence unit. The JDBC URL is overridden per-profile.
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:file:${user.home}/.devtown/qhorus;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE

# Override qhorus extension packages to include ledger model packages explicitly.
# This supersedes the embedded qhorus application.properties value.
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model

# casehub-ledger — use the qhorus persistence unit (no separate default datasource)
casehub.ledger.datasource=qhorus

# ── Default datasource (casehub-work) ──────────────────────────────────────────
# casehub-work uses the default Hibernate ORM persistence unit.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.devtown/work;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE

# When a named PU has explicit packages, the default PU also needs them declared.
# casehub-work entities live under io.casehub.work.runtime
quarkus.hibernate-orm.packages=io.casehub.work.runtime

# ── Trust routing (Layer 6) ─────────────────────────────────────────────────
casehub.platform.config.files=classpath:casehub/devtown/trust-routing.yaml,classpath:casehub/devtown/trust-gate.yaml
# Engine-ledger Flyway migrations (V2000 case_ledger_entry, V2001 worker_decision_entry)
quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/engine-ledger/migration
# Jandex: engine-ledger lacks embedded index (mirrors engine/engine-common pattern)
%prod.quarkus.index-dependency.engine-ledger.group-id=io.casehub
%prod.quarkus.index-dependency.engine-ledger.artifact-id=casehub-engine-ledger
