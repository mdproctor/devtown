quarkus.http.port=8080

# ── ARC bean exclusions (production only) ─────────────────────────────────────
# CasehubWorkloadProvider (engine-internal) conflicts with JpaWorkloadProvider (casehub-work).
# It should be @DefaultBean in the engine (tracked in engine issue) — excluded here as workaround.
# JpaWorkloadProvider requires a full JPA datasource wired to the work schema (devtown#34 pending).
# Devtown provides DevtownWorkloadProvider @ApplicationScoped as a no-op stand-in.
# %prod. scope: tests manage WorkloadProvider disambiguation via src/test/resources/application.properties.
# MockGroupMembershipProvider (casehub-platform) conflicts with NoOpGroupMembershipProvider
# (casehub-work) — exclude the mock; casehub-work's no-op is the correct production default.
# No %prod. prefix — quarkus.arc.exclude-types is a build-time property that must apply during augmentation.
quarkus.arc.exclude-types=io.casehub.engine.internal.worker.CasehubWorkloadProvider,io.casehub.work.runtime.service.JpaWorkloadProvider,io.casehub.platform.mock.MockGroupMembershipProvider,io.casehub.actorstate.ActorStateResource,io.casehub.actorstate.ReactiveActorStateResource,io.casehub.platform.oidc.SecurityIdentityCurrentPrincipal,io.casehub.work.runtime.service.TenantScopedPrincipal,io.casehub.persistence.memory.DefaultTestPrincipal,io.casehub.qhorus.runtime.identity.QhorusInboundCurrentPrincipal,io.casehub.platform.mock.MockCurrentPrincipal

# ── Jandex index — engine modules without embedded index ───────────────────────
# casehub-engine and casehub-engine-common lack Jandex indices (engine doesn't configure
# jandex-maven-plugin per module). Force Quarkus to index them for CDI bean discovery.
# %prod. scope prevents these from being applied during @QuarkusTest augmentation,
# which manages engine bean discovery separately via src/test/resources/application.properties.
%prod.quarkus.index-dependency.casehub-engine.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine.artifact-id=casehub-engine
%prod.quarkus.index-dependency.casehub-engine-common.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine-common.artifact-id=casehub-engine-common

# ── Engine persistence SPIs — in-memory for Layer 1-2 development ─────────────────
# Devtown provides @ApplicationScoped @Default subclasses of the in-memory SPI
# implementations in casehub-engine-persistence-memory. These satisfy the four engine
# CDI injection sites without requiring selected-alternatives activation.
# Replace with casehub-engine-persistence-hibernate (devtown#40) for a PostgreSQL backend.

# ── GDPR erasure receipt — foundation ledger creates tamper-evident receipt ──
casehub.ledger.erasure-receipt.enabled=true

# ── GitHub integration ─────────────────────────────────────────────────────────
devtown.github.token=${GITHUB_TOKEN:}
devtown.github.merge-method=squash
quarkus.rest-client.github-api.url=https://api.github.com
%prod.devtown.github.webhook-secret=${GITHUB_WEBHOOK_SECRET}

# ── Qhorus named datasource ────────────────────────────────────────────────────
# db-kind must be declared here (not test-only) so Quarkus augmentation resolves
# the named persistence unit. The JDBC URL is overridden per-profile.
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:file:${user.home}/.devtown/qhorus;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE

# Override qhorus extension packages to include ledger model packages explicitly.
# This supersedes the embedded qhorus application.properties value.
# devtown merge queue entities also use the qhorus datasource (db/devtown/migration runs via qhorus Flyway).
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model,io.casehub.devtown.app.ledger,io.casehub.devtown.app.persistence

# casehub-ledger — use the qhorus persistence unit (no separate default datasource)
casehub.ledger.datasource=qhorus

# ── Default datasource (casehub-work) ──────────────────────────────────────────
# casehub-work uses the default Hibernate ORM persistence unit.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.devtown/work;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE

# When a named PU has explicit packages, the default PU also needs them declared.
# casehub-work entities live under io.casehub.work.runtime
quarkus.hibernate-orm.packages=io.casehub.work.runtime,io.casehub.workadapter

# ── Trust routing (Layer 6) ─────────────────────────────────────────────────
casehub.platform.config.files=classpath:casehub/devtown/trust-routing.yaml,classpath:casehub/devtown/trust-gate.yaml
# Engine-ledger Flyway migrations (V2000 case_ledger_entry, V2001 worker_decision_entry)
quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/engine-ledger/migration,classpath:db/devtown/migration
# Jandex: engine-ledger lacks embedded index (mirrors engine/engine-common pattern)
%prod.quarkus.index-dependency.engine-ledger.group-id=io.casehub
%prod.quarkus.index-dependency.engine-ledger.artifact-id=casehub-engine-ledger

# ── OIDC security (devtown#90) ─────────────────────────────────────────────
quarkus.oidc.application-type=service
quarkus.security.jaxrs.deny-unannotated-endpoints=true

# MCP transport — restrict to authenticated operators (Vert.x routes, not JAX-RS).
quarkus.http.auth.permission.mcp.paths=/mcp/*
quarkus.http.auth.permission.mcp.policy=authenticated
quarkus.http.auth.permission.qhorus-mcp.paths=/qhorus/*
quarkus.http.auth.permission.qhorus-mcp.policy=authenticated

# Governance WebSocket — restrict to authenticated operators.
quarkus.http.auth.permission.governance-ws.paths=/api/governance/events
quarkus.http.auth.permission.governance-ws.policy=authenticated

# Dev profile — disable OIDC and security enforcement.
%dev.quarkus.security.auth.enabled-in-dev-mode=false
%dev.quarkus.oidc.enabled=false
%dev.quarkus.keycloak.devservices.enabled=false

# Dev profile — in-memory H2, skip Flyway (use Hibernate schema generation instead)
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:work;MODE=PostgreSQL
%dev.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL
%dev.quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/devtown/migration
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.locations=classpath:db/work/migration
%dev.devtown.github.webhook-secret=dev-secret

# ── Quinoa frontend ────────────────────────────────────────────────────
quarkus.quinoa.build-dir=dist
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=22.11.0
quarkus.quinoa.enable-spa-routing=true

# Static assets — permit unauthenticated access (Quinoa-served frontend)
quarkus.http.auth.permission.quinoa-static.paths=/,/index.html,/app.js
quarkus.http.auth.permission.quinoa-static.policy=permit
