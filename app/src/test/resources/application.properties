# Random port — avoids conflicts when test suites run in parallel
quarkus.http.test-port=0

# Index engine-testing jar so Test*Repository CDI beans are discoverable in tests
quarkus.index-dependency.engine-testing.group-id=io.casehub
quarkus.index-dependency.engine-testing.artifact-id=casehub-engine-testing

# Index engine-common so engine.internal.jq.JQEvaluator @ApplicationScoped bean is discoverable.
# Required after engine#316 — WorkOrchestrator, CaseContextChangedEventHandler etc. now inject it.
quarkus.index-dependency.engine-common.group-id=io.casehub
quarkus.index-dependency.engine-common.artifact-id=casehub-engine-common

# Index engine-scheduler-quartz so JobScheduler + WorkerExecutionManager CDI beans are discoverable in tests
quarkus.index-dependency.engine-scheduler-quartz.group-id=io.casehub
quarkus.index-dependency.engine-scheduler-quartz.artifact-id=casehub-engine-scheduler-quartz

# Index work-adapter so HumanTaskScheduleHandler + WorkItemLifecycleAdapter CDI beans are discoverable
quarkus.index-dependency.engine-work-adapter.group-id=io.casehub
quarkus.index-dependency.engine-work-adapter.artifact-id=casehub-engine-work-adapter

# Index blackboard (transitive via work-adapter) so BlackboardRegistry bean is discoverable
quarkus.index-dependency.engine-blackboard.group-id=io.casehub
quarkus.index-dependency.engine-blackboard.artifact-id=casehub-engine-blackboard

# Index persistence-memory so MemorySubCaseGroupRepository (needed by blackboard) is discoverable
quarkus.index-dependency.engine-persistence-memory.group-id=io.casehub
quarkus.index-dependency.engine-persistence-memory.artifact-id=casehub-engine-persistence-memory

# Resolve CDI ambiguity: engine provides CasehubWorkloadProvider as the bridge;
# exclude JpaWorkloadProvider so the engine's bridge is the unique @Default bean.
quarkus.arc.exclude-types=io.casehub.work.runtime.service.JpaWorkloadProvider,io.casehub.actorstate.ActorStateResource,io.casehub.actorstate.ReactiveActorStateResource,io.casehub.work.runtime.service.NoOpSlaBreachPolicy

# Note: quarkus.arc.selected-alternatives is a build-time property — %test. prefix has no effect.
# This activates MemorySubCaseGroupRepository globally for augmentation (safe because this
# file is in src/test/resources and only on the test classpath).
# Required because casehub-engine-blackboard (via work-adapter) injects SubCaseGroupRepository.
# MemoryPlanItemStore is still activated explicitly — no Devtown default subclass for PlanItemStore.
# DevtownSubCaseGroupRepository (@ApplicationScoped) replaces the MemorySubCaseGroupRepository
# activation; no need to select MemorySubCaseGroupRepository here anymore.
quarkus.arc.selected-alternatives=io.casehub.persistence.memory.MemoryPlanItemStore,io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository,io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository

# Qhorus named datasource — in-memory H2 for tests
%test.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:devtown-qhorus-test;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.flyway.qhorus.migrate-at-start=false
%test.quarkus.hibernate-orm.qhorus.schema-management.strategy=drop-and-create

# casehub-work uses the default datasource — in-memory H2 for tests
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:devtown-work-test;DB_CLOSE_ON_EXIT=FALSE
# Disable reactive pool for default datasource — H2 has no reactive driver
%test.quarkus.datasource.reactive=false
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Disable ledger writes in tests — CaseLedgerEventCapture and WorkerDecisionEventCapture
# check ledgerConfig.enabled() and return early. This avoids the LEDGER_SUBJECT_SEQUENCE
# table missing in H2 drop-and-create mode (the table is created by Flyway, not Hibernate).
# Trust-scoring beans (TrustGateService, TrustWeightedAgentStrategy) are unaffected — they
# do not check this flag. Refs devtown#69, engine#436.
casehub.ledger.enabled=false

# Jandex: engine-ledger — required for TrustWeightedAgentStrategy and WorkerDecisionEventCapture CDI discovery
quarkus.index-dependency.engine-ledger.group-id=io.casehub
quarkus.index-dependency.engine-ledger.artifact-id=casehub-engine-ledger

# Jandex: casehub-ledger — required for JpaLedgerEntryRepository, LedgerPrivacyProducer,
# LedgerEntityManagerProducer, LedgerSequenceAllocator CDI discovery (Layer 4 ledger audit)
quarkus.index-dependency.casehub-ledger.group-id=io.casehub
quarkus.index-dependency.casehub-ledger.artifact-id=casehub-ledger

# Jandex: casehub-platform-config — required for ConfigFilePreferenceProvider CDI discovery
# Without this, MockPreferenceProvider @DefaultBean wins and trust-gate.yaml is never loaded.
quarkus.index-dependency.platform-config.group-id=io.casehub
quarkus.index-dependency.platform-config.artifact-id=casehub-platform-config

# Jandex: devtown-github — required for GitHubMergeClient CDI discovery (MergeClient injection)
quarkus.index-dependency.devtown-github.group-id=io.casehub
quarkus.index-dependency.devtown-github.artifact-id=casehub-devtown-github

# GitHub integration — test values
devtown.github.webhook-secret=test-secret
# GitHub REST client — required for CDI resolution of GitHubMergeClient (github-api config key)
quarkus.rest-client.github-api.url=http://localhost:0

# Prevent enqueue() from triggering immediate batch formation in tests.
# Tests that need batch formation use DefaultBatchCompositionPolicyTest (unit test, no CDI).
casehub.platform.preferences.defaults."devtown.merge-queue.min-batch-size"=100

# ── OIDC test config (devtown#90) ──────────────────────────────────────────
# GE-20260521-f50602: discovery-disabled requires jwks-path (lazy-loaded, never fetched with @TestSecurity)
quarkus.oidc.auth-server-url=http://localhost:8180/realms/test
quarkus.oidc.discovery-enabled=false
quarkus.oidc.jwks-path=protocol/openid-connect/certs
quarkus.keycloak.devservices.enabled=false
quarkus.security.jaxrs.deny-unannotated-endpoints=true
